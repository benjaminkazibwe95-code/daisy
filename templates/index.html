<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daisy</title>
  <!-- Non-blocking font load — page renders even if fonts fail -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"></noscript>
  <!-- Markdown rendering for Daisy's responses (headers, bullets, bold, tables, etc.) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
  <!-- Real math notation (proper fractions, exponents, etc.) instead of plain-text "^" and "/" -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
  <!-- Syntax-highlighted code (real colors, not plain monospace text) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── DARK MODE (default) — Claude's exact charcoal dark ── */
    :root {
      --black:   #2b2b2b;   /* Claude charcoal — exactly as in Claude app */
      --surface: #333333;
      --card:    #3a3a3a;
      --border:  #484848;
      --text:    #f0f0f0;
      --muted:   #9a9a9a;
      --daisy:   #7eb8f7;
      --daisy2:  #a78bfa;
      --live:    #f87171;
      --radius:  18px;
    }

    /* ── LIGHT MODE — follows phone system preference ── */
    @media (prefers-color-scheme: light) {
      :root {
        --black:   #f5f5f0;   /* warm off-white — gentler than pure white */
        --surface: #ebebeb;
        --card:    #e0e0da;
        --border:  #d0d0ca;
        --text:    #1c1c1e;
        --muted:   #6e6e73;
        --daisy:   #2a7dd4;   /* deeper blue reads well on light */
        --daisy2:  #7c3aed;
        --live:    #dc2626;
      }
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;          /* fallback */
      height: 100dvh;         /* modern */
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--surface);
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: var(--card); }
    .icon-btn svg { width: 18px; height: 18px; }

    #user-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--daisy), var(--daisy2));
      border: none;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    /* ── MAIN SCROLL AREA ── */
    #main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 20px;
      scrollbar-width: none;
      position: relative;
    }
    #main::-webkit-scrollbar { display: none; }

    /* ── GREETING ── */
    #greeting-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 0 36px;
      text-align: center;
    }

    .daisy-orb {
      width: 52px; height: 52px;
      margin-bottom: 22px;
      position: relative;
    }
    .daisy-orb svg {
      width: 100%; height: 100%;
      animation: spin-slow 12s linear infinite;
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #greeting {
      font-family: 'Instrument Serif', serif;
      font-size: 32px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    /* ── CHAT MESSAGES ── */
    #chat-area {
      display: none;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 12px;
    }
    #chat-area.active { display: flex; }

    .msg {
      max-width: 88%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 16px;
      line-height: 1.6;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--surface);
      color: var(--text);
      border-bottom-right-radius: 4px;
    }
    .msg.daisy {
      align-self: flex-start;
      background: transparent;
      color: var(--text);
      border-bottom-left-radius: 4px;
      padding-left: 0;
    }
    .msg.daisy .daisy-label {
      font-size: 11px;
      color: var(--daisy);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ── RENDERED MARKDOWN (inside Daisy's messages) ── */
    .md-body { font-size: 16px; line-height: 1.6; }
    .md-body h1, .md-body h2, .md-body h3 {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      line-height: 1.3;
      margin: 16px 0 7px;
      color: var(--text);
    }
    .md-body h1:first-child, .md-body h2:first-child, .md-body h3:first-child { margin-top: 0; }
    .md-body h1 { font-size: 21px; }
    .md-body h2 { font-size: 18.5px; }
    .md-body h3 { font-size: 16.5px; color: var(--daisy); }
    .md-body p { margin: 8px 0; }
    .md-body p:first-child { margin-top: 0; }
    .md-body p:last-child { margin-bottom: 0; }
    .md-body ul, .md-body ol { margin: 8px 0; padding-left: 22px; }
    .md-body li { margin: 4px 0; }
    .md-body li::marker { color: var(--daisy); }
    .md-body strong { font-weight: 600; color: var(--text); }
    .md-body em { font-style: italic; }
    .md-body code {
      background: var(--card);
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 14.5px;
      font-family: 'SF Mono', Consolas, monospace;
    }
    .md-body pre {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .md-body pre code { background: none; padding: 0; }

    /* ── CODE BLOCKS (short snippets) ── */
    .code-block {
      margin: 10px 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .code-block-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 6px 6px 12px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
    }
    .code-block-lang {
      font-size: 11px;
      color: var(--muted);
      font-family: 'SF Mono', Consolas, monospace;
      text-transform: lowercase;
    }
    .code-block-copy {
      width: 28px; height: 28px;
      border: none; background: none;
      color: var(--muted);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .code-block-copy svg { width: 13px; height: 13px; }
    .code-block-copy:hover { background: var(--surface); color: var(--text); }
    .code-block-copy.copied { color: var(--daisy); }
    .code-block pre {
      margin: 0; border: none; border-radius: 0;
      background: var(--card);
      padding: 12px 14px;
      overflow-x: auto;
    }
    .code-block code {
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 12.5px;
      line-height: 1.55;
      background: none;
    }

    /* ── FILE CARDS (complete, downloadable files) ── */
    .file-card {
      margin: 10px 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--card);
    }
    .file-card-head {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 13px 14px 10px;
    }
    .file-card-icon {
      flex-shrink: 0;
      width: 34px; height: 34px;
      border-radius: 9px;
      background: var(--surface);
      color: var(--daisy);
      display: flex; align-items: center; justify-content: center;
    }
    .file-card-icon svg { width: 16px; height: 16px; }
    .file-card-meta { flex: 1; min-width: 0; }
    .file-card-name {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
      font-family: 'SF Mono', Consolas, monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .file-card-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

    /* Preview / Code tabs — only present on renderable files (html, svg).
       Preview is the default tab: someone who doesn't read code wants
       to see the poster/page/logo itself, not markup. */
    .file-card-tabs {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 14px 10px;
    }
    .file-card-tab {
      padding: 6px 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
    }
    .file-card-tab.active {
      background: var(--surface);
      color: var(--text);
      border-color: var(--text);
    }
    .file-card-expand {
      margin-left: auto;
      width: 28px; height: 28px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: none;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .file-card-expand svg { width: 13px; height: 13px; }

    /* ── FULLSCREEN PREVIEW ── */
    .preview-modal {
      position: fixed; inset: 0;
      z-index: 200;
      background: #000;
      display: flex;
      flex-direction: column;
    }
    .preview-modal-close {
      position: absolute;
      top: 14px; left: 14px;
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      background: rgba(40,40,40,0.85);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 1;
    }
    .preview-modal-close svg { width: 17px; height: 17px; }
    .preview-modal-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }

    /* ── FULLSCREEN CODE MODAL ── */
    .code-modal-head {
      padding: 14px 14px 14px 60px;
      color: #ccc;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      border-bottom: 1px solid #2a2a2a;
      flex: 0 0 auto;
    }
    .code-modal-pre {
      flex: 1;
      margin: 0;
      padding: 16px 20px 40px;
      overflow: auto;
      background: #0d0d0d;
    }
    .code-modal-pre code {
      color: #e8e8e8;
      font-family: 'JetBrains Mono', 'Menlo', monospace;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre;
    }


    .file-card-actions {
      display: flex; gap: 8px;
      padding: 0 14px 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .file-card-actions::-webkit-scrollbar { display: none; }
    .file-card-btn {
      flex: 0 0 auto;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 14px;
      white-space: nowrap;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 12.5px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
    }
    .file-card-btn svg { width: 13px; height: 13px; }
    .file-card-btn.primary { background: var(--daisy); color: #15110a; border-color: var(--daisy); }
    .file-card-btn.copied { background: var(--daisy); color: #15110a; border-color: var(--daisy); }

    .file-card-preview {
      border: none;
      border-top: 1px solid var(--border);
      width: 100%;
      height: 280px;
      background: #fff; /* the previewed page sets its own colors; white avoids a dark flash before it loads */
    }
    .file-card-pre {
      margin: 0;
      border: none; border-radius: 0;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
      padding: 12px 14px;
      max-height: 320px;
      overflow: auto;
    }
    .file-card-pre code {
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      background: none;
      white-space: pre;
    }
    .md-body blockquote {
      border-left: 3px solid var(--daisy);
      padding-left: 12px;
      margin: 8px 0;
      color: var(--muted);
    }
    .md-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 10px 0;
      font-size: 13px;
    }
    .md-body th, .md-body td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
    }
    .md-body th { background: var(--card); font-weight: 600; }
    .md-body a { color: var(--daisy); text-decoration: underline; }
    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .md-body .katex-display {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 4px 0;
    }

    /* ── MESSAGE ACTION TOOLBAR (under each Daisy reply) ── */
    .msg-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      opacity: 0.75;
    }
    .msg-action-btn {
      width: 36px; height: 36px;
      border: none;
      background: none;
      color: var(--muted);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .msg-action-btn:hover { background: var(--card); color: var(--text); }
    .msg-action-btn svg { width: 17px; height: 17px; }
    .msg-action-btn.active.up   { color: #6ee7b7; }
    .msg-action-btn.active.down { color: #f87171; }
    .msg-action-btn.copied { color: var(--daisy); }

    /* ── TAP MENU (on a user's own sent message) ── */
    .msg.user { cursor: pointer; position: relative; }
    .msg-menu-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 80;
      display: none;
    }
    .msg-menu-overlay.show { display: block; }
    .msg-menu {
      position: fixed;
      z-index: 81;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .msg-menu-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%;
      padding: 13px 16px;
      background: none;
      border: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }
    .msg-menu-item:hover { background: var(--surface); }
    .msg-menu-item.danger { color: #f87171; }
    .msg-menu-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── SCROLL TO BOTTOM ── */
    #scroll-bottom-btn {
      position: absolute;
      left: 50%;
      bottom: 100%;
      transform: translate(-50%, 10px);
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      display: flex;
      align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    #scroll-bottom-btn.show {
      opacity: 1;
      transform: translate(-50%, 0);
      pointer-events: auto;
    }
    #scroll-bottom-btn svg { width: 17px; height: 17px; }

    .thinking {
      display: flex; gap: 5px; align-items: center;
      padding: 12px 0;
    }
    .thinking span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--daisy);
      opacity: 0.4;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1.1); }
    }

    /* ── THINKING PANEL (steps + which law fired) ── */
    .thinking-panel {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px 0;
      font-size: 13px;
      color: var(--muted);
    }
    .thinking-panel .t-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--daisy);
      flex-shrink: 0;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .thinking-step {
      transition: opacity 0.22s ease;
    }
    .thinking-tag {
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 10px;
      color: var(--daisy);
      background: var(--card);
      border-radius: 6px;
      padding: 2px 6px;
      margin-left: 7px;
      letter-spacing: 0.02em;
    }

    /* ── QUICK STARTS ── */
    #quick-starts {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px 20px;
      margin-bottom: 24px;
    }
    #quick-starts p {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .quick-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border: none;
      background: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      border-radius: 10px;
      transition: color 0.15s;
    }
    .quick-item:hover { color: var(--daisy); }
    .quick-item + .quick-item { border-top: 1px solid var(--border); }
    .quick-icon {
      width: 32px; height: 32px;
      border-radius: 10px;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 15px;
    }

    /* ── INPUT BAR ── */
    #input-area {
      padding: 12px 16px 20px;
      flex-shrink: 0;
      background: var(--black);
      position: relative;
    }

    #input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 10px 10px 10px 18px;
      transition: border-color 0.2s;
    }
    #input-row:focus-within {
      border-color: var(--daisy);
    }

    #question-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    #question-input::placeholder { color: var(--muted); }
    #question-input::-webkit-scrollbar { display: none; }

    #speaker-btn, #action-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    #speaker-btn {
      background: var(--card);
      color: var(--muted);
    }
    #speaker-btn:hover { background: var(--border); color: var(--text); }

    /* Action btn — mic by default (dark), send when typing (daisy blue) */
    #action-btn {
      background: var(--card);
      color: var(--muted);
    }
    #action-btn.send-mode {
      background: var(--daisy);
      color: #000;
    }
    #action-btn:hover { transform: scale(1.05); }
    #action-btn:active { transform: scale(0.95); }
    #action-btn svg { width: 16px; height: 16px; }

    /* ── LIVE ROOM — Full screen Gemini style ── */
    #live-room {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }
    #live-room.active { display: flex; }

    #live-bg {
      position: absolute;
      inset: 0;
      z-index: -1;
      background: radial-gradient(ellipse 100% 70% at 50% 100%, #1a3a6e 0%, #0d1f40 40%, #080808 75%);
    }

    /* Top bar */
    #live-topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 52px 24px 0;
    }
    #live-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.03em;
    }
    #live-captions-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 10px;
      padding: 8px 10px;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* Center */
    #live-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      flex: 1;
      justify-content: center;
      padding: 0 24px;
    }

    /* Wave bars — taller, more bars, Gemini feel */
    #wave-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      height: 80px;
    }
    .wave-bar {
      width: 4px;
      border-radius: 4px;
      background: #7eb8f7;
      height: 8px;
    }
    .wave-bar:nth-child(even) { background: #a78bfa; }
    .wave-bar.idle { animation: wave-idle 1.8s ease-in-out infinite; }
    .wave-bar:nth-child(1)  { animation-delay: 0.00s; }
    .wave-bar:nth-child(2)  { animation-delay: 0.10s; }
    .wave-bar:nth-child(3)  { animation-delay: 0.20s; }
    .wave-bar:nth-child(4)  { animation-delay: 0.30s; }
    .wave-bar:nth-child(5)  { animation-delay: 0.05s; }
    .wave-bar:nth-child(6)  { animation-delay: 0.15s; }
    .wave-bar:nth-child(7)  { animation-delay: 0.25s; }
    .wave-bar:nth-child(8)  { animation-delay: 0.35s; }
    .wave-bar:nth-child(9)  { animation-delay: 0.00s; }
    .wave-bar:nth-child(10) { animation-delay: 0.12s; }
    .wave-bar:nth-child(11) { animation-delay: 0.22s; }
    .wave-bar:nth-child(12) { animation-delay: 0.32s; }
    .wave-bar:nth-child(13) { animation-delay: 0.08s; }
    .wave-bar:nth-child(14) { animation-delay: 0.18s; }
    .wave-bar:nth-child(15) { animation-delay: 0.28s; }
    .wave-bar:nth-child(16) { animation-delay: 0.38s; }

    @keyframes wave-idle {
      0%, 100% { height: 6px;  opacity: 0.3; }
      50%       { height: 32px; opacity: 1; }
    }

    #live-transcript {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      color: rgba(255,255,255,0.9);
      text-align: center;
      line-height: 1.5;
      font-style: italic;
      max-width: 320px;
    }

    /* Bottom controls */
    #live-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 0 24px 52px;
      width: 100%;
    }

    .live-ctrl {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      transition: transform 0.15s, background 0.15s;
    }
    .live-ctrl:hover { transform: scale(1.08); background: rgba(255,255,255,0.2); }
    .live-ctrl:active { transform: scale(0.92); }
    #mic-btn.muted { background: rgba(248,113,113,0.3); }
    #end-live {
      background: #ef4444;
      width: 64px; height: 64px;
    }
    #end-live:hover { background: #dc2626; }

    /* ── DRAWER MENU ── */
    #drawer-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 90;
      background: rgba(0,0,0,0.6);
    }
    #drawer-overlay.active { display: block; }
    #drawer {
      position: fixed;
      top: 0; left: -280px; bottom: 0;
      width: 270px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 95;
      padding: 56px 0 32px;
      transition: left 0.25s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
    }
    #drawer.open { left: 0; }

    #drawer-title {
      font-family: 'Instrument Serif', serif;
      font-size: 26px;
      color: var(--text);
      padding: 0 24px 24px;
      border-bottom: 1px solid var(--border);
    }

    .drawer-section {
      padding: 20px 24px 0;
    }
    .drawer-section-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .drawer-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border: none;
      background: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      border-radius: 8px;
      transition: color 0.15s;
    }
    .drawer-item:hover { color: var(--daisy); }
    .drawer-item .d-icon { font-size: 16px; width: 24px; text-align: center; }

    .drawer-footer {
      margin-top: auto;
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }
    .drawer-footer strong { color: var(--daisy); font-weight: 500; }

    /* ── DISCLAIMER ── */
    #disclaimer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 8px 0 4px;
    }
    /* ── PROFILE PANEL ── */
    #profile-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 90;
      background: rgba(0,0,0,0.5);
    }
    #profile-overlay.active { display: block; }

    #profile-panel {
      position: fixed;
      top: 0; right: -320px; bottom: 0;
      width: 300px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 95;
      padding: 56px 24px 32px;
      transition: right 0.25s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    #profile-panel.open { right: 0; }

    #close-profile {
      position: absolute;
      top: 16px; right: 20px;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--card);
      border: none; color: var(--muted);
      cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }

    #profile-header {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #profile-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--daisy), var(--daisy2));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 500; color: #fff;
      flex-shrink: 0;
    }
    #profile-name-display {
      font-size: 16px; font-weight: 500; color: var(--text);
    }
    #profile-email-display {
      font-size: 12px; color: var(--muted); margin-top: 2px;
    }

    #profile-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #profile-form label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    #profile-form input {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #profile-form input:focus { border-color: var(--daisy); }
    #save-profile {
      margin-top: 4px;
      background: var(--daisy);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 11px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #save-profile:hover { opacity: 0.85; }

  </style>
</head>

<script>
document.addEventListener('DOMContentLoaded', function() {
  try {
  const greetingEl = document.getElementById('greeting');
  const userBtn    = document.getElementById('user-btn');

  function getUser() {
    try { return JSON.parse(localStorage.getItem('daisy_user') || '{}'); } catch(e) { return {}; }
  }
  function saveUser(data) {
    localStorage.setItem('daisy_user', JSON.stringify(data));
  }

  function applyUser() {
    const user = getUser();
    const name = user.name || '';
    const initial = name ? name.trim()[0].toUpperCase() : '?';
    userBtn.textContent = initial;
    document.getElementById('profile-avatar').textContent = initial;
    document.getElementById('profile-name-display').textContent = name || 'Your account';
    document.getElementById('profile-email-display').textContent = user.email || '';
    document.getElementById('pname').value  = name;
    document.getElementById('pemail').value = user.email || '';
    const h = new Date().getHours();
    const tod = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
    greetingEl.textContent = name ? `Good ${tod}, ${name}` : `Good ${tod}`;
  }

  applyUser();

  // Profile panel
  const profilePanel   = document.getElementById('profile-panel');
  const profileOverlay = document.getElementById('profile-overlay');
  userBtn.onclick = () => {
    profilePanel.classList.add('open');
    profileOverlay.classList.add('active');
  };
  document.getElementById('close-profile').onclick = closeProfile;
  profileOverlay.onclick = closeProfile;
  function closeProfile() {
    profilePanel.classList.remove('open');
    profileOverlay.classList.remove('active');
  }
  document.getElementById('save-profile').onclick = () => {
    const name  = document.getElementById('pname').value.trim();
    const email = document.getElementById('pemail').value.trim();
    saveUser({ name, email });
    applyUser();
    closeProfile();
  };

  // ── AUTO-RESIZE TEXTAREA ──────────────────────────────
  const inp = document.getElementById('question-input');
  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── CHAT ─────────────────────────────────────────────
  const chatArea   = document.getElementById('chat-area');
  const quickStarts = document.getElementById('quick-starts');
  const greetWrap  = document.getElementById('greeting-wrap');
  let chatActive   = false;

  function activateChat() {
    if (!chatActive) {
      chatActive = true;
      chatArea.classList.add('active');
      quickStarts.style.display = 'none';
      greetWrap.style.paddingTop = '20px';
      greetWrap.querySelector('#greeting').style.fontSize = '20px';
    }
  }

  // ── ICONS for the message action toolbar / tap-menu ──
  const ICONS = {
    copy:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a1 1 0 01-1-1V4a1 1 0 011-1h10a1 1 0 011 1v1"/></svg>',
    up:       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11v9H4a1 1 0 01-1-1v-7a1 1 0 011-1h3zm0 0l4.5-7.5a1.5 1.5 0 012.7 1.3L13 9h5.3a2 2 0 011.9 2.7l-2.3 6A2 2 0 0116 19H9a2 2 0 01-2-2v-6z"/></svg>',
    down:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><g transform="scale(1,-1) translate(0,-24)"><path d="M7 11v9H4a1 1 0 01-1-1v-7a1 1 0 011-1h3zm0 0l4.5-7.5a1.5 1.5 0 012.7 1.3L13 9h5.3a2 2 0 011.9 2.7l-2.3 6A2 2 0 0116 19H9a2 2 0 01-2-2v-6z"/></g></svg>',
    share:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 10.6l6.8-3.8M8.6 13.4l6.8 3.8"/></svg>',
    redo:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0115.5-6.4M21 12a9 9 0 01-15.5 6.4"/><path d="M3 5v5h5M21 19v-5h-5"/></svg>',
    edit:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4h2M4 20h4l10.5-10.5a2.1 2.1 0 00-3-3L5 17v3z"/></svg>',
    trash:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>',
    file:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>',
    download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4"/><path d="M4 21h16"/></svg>',
    print:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V3h12v6"/><rect x="4" y="9" width="16" height="8" rx="1"/><path d="M6 17v4h12v-4"/></svg>',
    expand:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3H5a2 2 0 00-2 2v4M15 3h4a2 2 0 012 2v4M9 21H5a2 2 0 01-2-2v-4M15 21h4a2 2 0 002-2v-4"/></svg>',
    close:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>',
  };

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderMarkdown(text) {
    // marked/DOMPurify load from a CDN — if either failed (offline, ad
    // blocker, etc.) fall back to plain escaped text so Daisy never
    // just breaks because a script tag didn't load.
    if (typeof marked === 'undefined' || typeof DOMPurify === 'undefined') {
      return escHtml(text).replace(/\n/g, '<br>');
    }
    // A code fence only renders as a real code block if ``` starts its
    // own line — that's a CommonMark rule, not a bug in this app. If
    // the model writes "...built to move. ```html:file.html" mid-
    // sentence, marked correctly leaves it as literal text (which is
    // what showed up as raw backticks in the screenshot). Force a line
    // break before any ``` that isn't already at the start of a line,
    // so it gets a fair chance to be parsed as a fence either way.
    const normalized = text.replace(/([^\n])(```)/g, '$1\n\n$2');
    const html = marked.parse(normalized, { breaks: true });
    // ADD_ATTR: the custom code-block/file-card buttons below carry
    // data-action/data-code-id/data-filename — DOMPurify strips any
    // attribute not on its default whitelist, so these need to be
    // explicitly allowed or every copy/download button would silently
    // lose its wiring on every render.
    return DOMPurify.sanitize(html, {
      ADD_TAGS: ['iframe'],
      ADD_ATTR: ['data-action', 'data-code-id', 'data-filename', 'sandbox', 'referrerpolicy'],
    });
  }

  // ── CODE BLOCKS & FILE CARDS ──
  // A short example gets a normal code block with a small copy button
  // (the way Claude.ai / most chat UIs show inline code). A complete
  // file meant to be saved gets a distinct card — icon, filename,
  // copy + download — adapted from how Claude's Artifacts / ChatGPT's
  // Canvas present generated files, just without a side panel: there's
  // no room for a split view on a phone, so the "artifact" becomes an
  // inline card instead of a separate pane.
  //
  // Daisy signals which is which through the fence's info string:
  // a plain ```language is a snippet; ```language:filename.ext is a
  // real file (see the MATH/FORMATTING rules in app.py's system prompt).
  let _codeBlockSeq = 0;
  const _codeBlockText = {}; // id -> raw code, kept outside the DOM so copy/download always get the exact original text, not whatever survived HTML rendering

  const FILE_EXT_LABEL = {
    html: 'HTML', css: 'CSS', js: 'JS', jsx: 'JSX', ts: 'TS', tsx: 'TSX',
    py: 'PY', json: 'JSON', sql: 'SQL', sh: 'SH', md: 'MD', txt: 'TXT',
    csv: 'CSV', xml: 'XML', svg: 'SVG', yml: 'YAML', yaml: 'YAML',
  };

  function escAttr(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatBytes(n) {
    return n > 1024 ? (n / 1024).toFixed(1) + ' KB' : n + ' B';
  }

  function setupMarkedRenderer() {
    if (typeof marked === 'undefined') return; // CDN didn't load — code still shows, just via the plain markdown fallback path
    const renderer = new marked.Renderer();
    const RENDERABLE = new Set(['html', 'htm', 'svg']);

    renderer.code = function(code, infostring) {
      const id = 'cb' + (_codeBlockSeq++);
      _codeBlockText[id] = code;

      let lang = (infostring || '').trim();
      let filename = '';
      if (lang.includes(':')) {
        const idx = lang.indexOf(':');
        filename = lang.slice(idx + 1).trim();
        lang = lang.slice(0, idx).trim();
      }
      const isFile = !!filename && /\.[a-zA-Z0-9]+$/.test(filename);
      const codeHtml = escHtml(code);

      if (isFile) {
        const ext = (filename.split('.').pop() || '').toLowerCase();
        const badge = FILE_EXT_LABEL[ext] || ext.toUpperCase().slice(0, 4) || 'FILE';
        const lines = code.split('\n').length;
        const renderable = RENDERABLE.has(ext);

        const tabs = renderable ? `
          <div class="file-card-tabs">
            <button class="file-card-tab active" data-action="show-preview" data-code-id="${id}">Preview</button>
            <button class="file-card-tab" data-action="show-code" data-code-id="${id}">Code</button>
            <button class="file-card-expand" data-action="expand" data-code-id="${id}" title="Open full view">${ICONS.expand}</button>
          </div>` : '';

        // The iframe starts empty on purpose — its content gets set via
        // the .srcdoc PROPERTY in a JS pass after insertion (see
        // renderFilePreviews), never written here as an HTML attribute.
        // Generated pages can contain quotes, backticks, anything; trying
        // to escape arbitrary code into one attribute string is exactly
        // the kind of thing that breaks in some edge case later.
        const previewBlock = renderable
          ? `<iframe class="file-card-preview" data-code-id="${id}" sandbox="allow-scripts allow-modals" referrerpolicy="no-referrer"></iframe>`
          : '';

        const codeBlock = `<pre class="file-card-pre"${renderable ? ' style="display:none"' : ''}><code class="language-${escAttr(lang || ext)}">${codeHtml}</code></pre>`;

        const printBtn = renderable
          ? `<button class="file-card-btn" data-action="print" data-code-id="${id}">${ICONS.print}<span>Print</span></button>`
          : '';

        return `<div class="file-card">
          <div class="file-card-head">
            <span class="file-card-icon">${ICONS.file}</span>
            <div class="file-card-meta">
              <div class="file-card-name">${escHtml(filename)}</div>
              <div class="file-card-sub">${badge} · ${lines} line${lines === 1 ? '' : 's'} · ${formatBytes(code.length)}</div>
            </div>
          </div>
          ${tabs}
          <div class="file-card-actions">
            <button class="file-card-btn" data-action="copy" data-code-id="${id}">${ICONS.copy}<span>Copy</span></button>
            ${printBtn}
            <button class="file-card-btn primary" data-action="download" data-code-id="${id}" data-filename="${escAttr(filename)}">${ICONS.download}<span>Download</span></button>
          </div>
          ${previewBlock}
          ${codeBlock}
        </div>`;
      }

      return `<div class="code-block">
        <div class="code-block-head">
          <span class="code-block-lang">${escHtml(lang || 'code')}</span>
          <button class="code-block-copy" data-action="copy" data-code-id="${id}" title="Copy">${ICONS.copy}</button>
        </div>
        <pre><code class="language-${escAttr(lang || 'plaintext')}">${codeHtml}</code></pre>
      </div>`;
    };
    marked.use({ renderer });
  }
  setupMarkedRenderer();

  // One delegated listener handles every code-block/file-card button,
  // since they're created (and recreated, during the typing animation)
  // dynamically — individual per-button listeners would need rewiring
  // on every single re-render.
  chatArea.addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const code = _codeBlockText[btn.dataset.codeId];
    if (code === undefined) return;

    if (btn.dataset.action === 'copy') {
      try { await navigator.clipboard.writeText(code); flashAction(btn); } catch (err) {}
    } else if (btn.dataset.action === 'download') {
      const filename = btn.dataset.filename || 'daisy-file.txt';
      const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
      flashAction(btn);
    } else if (btn.dataset.action === 'show-preview' || btn.dataset.action === 'show-code') {
      const card = btn.closest('.file-card');
      if (!card) return;
      const wantPreview = btn.dataset.action === 'show-preview';
      card.querySelectorAll('.file-card-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      const preview = card.querySelector('.file-card-preview');
      const codeView = card.querySelector('.file-card-pre');
      if (preview) preview.style.display = wantPreview ? '' : 'none';
      if (codeView) codeView.style.display = wantPreview ? 'none' : '';
    } else if (btn.dataset.action === 'print') {
      const card = btn.closest('.file-card');
      const frame = card ? card.querySelector('.file-card-preview') : null;
      if (frame && frame.contentWindow) {
        try { frame.contentWindow.focus(); frame.contentWindow.print(); } catch (err) {}
      }
    } else if (btn.dataset.action === 'expand') {
      const card = btn.closest('.file-card');
      const codeTab = card ? card.querySelector('.file-card-tab[data-action="show-code"]') : null;
      const codeIsActive = codeTab && codeTab.classList.contains('active');
      const filename = card.querySelector('.file-card-name').textContent;
      const ext = (filename.split('.').pop() || '').toLowerCase();

      if (codeIsActive) {
        // Code tab is active — open a fullscreen CODE view, not the preview.
        openCodeModal(code, ext, filename);
      } else {
        const frame = card ? card.querySelector('.file-card-preview') : null;
        if (frame && frame.srcdoc) {
          openPreviewModal(frame.srcdoc);
        } else {
          // Inline preview hasn't populated yet — derive it directly
          // instead of opening the modal blank.
          openPreviewModal(wrapForPreview(code, ext));
        }
      }
    }
  });

  const previewModal      = document.getElementById('preview-modal');
  const previewModalFrame = document.getElementById('preview-modal-frame');
  const previewModalClose = document.getElementById('preview-modal-close');
  previewModalClose.innerHTML = ICONS.close;

  function openPreviewModal(srcdoc) {
    previewModalFrame.srcdoc = srcdoc;
    previewModal.style.display = 'flex';
  }
  function closePreviewModal() {
    previewModal.style.display = 'none';
    previewModalFrame.srcdoc = ''; // stop anything still running inside (audio, timers, etc.) once closed
  }
  previewModalClose.addEventListener('click', closePreviewModal);

  // ── FULLSCREEN CODE MODAL (separate from preview modal) ──
  function openCodeModal(code, ext, filename) {
    let modal = document.getElementById('code-modal');
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'code-modal';
      modal.className = 'preview-modal';
      modal.innerHTML = `
        <button class="preview-modal-close" id="code-modal-close" aria-label="Close">${ICONS.close}</button>
        <div class="code-modal-head" id="code-modal-filename"></div>
        <pre class="code-modal-pre"><code id="code-modal-body"></code></pre>`;
      document.body.appendChild(modal);
      modal.querySelector('#code-modal-close').addEventListener('click', () => {
        modal.style.display = 'none';
      });
    }
    modal.querySelector('#code-modal-filename').textContent = filename || '';
    const bodyEl = modal.querySelector('#code-modal-body');
    bodyEl.className = 'language-' + (ext || 'plaintext');
    bodyEl.textContent = code;
    if (window.hljs) { try { hljs.highlightElement(bodyEl); } catch (err) {} }
    modal.style.display = 'flex';
  }


  // Converts $$...$$ (standalone formulas) and \(...\) (inline math)
  // into real rendered notation via KaTeX. Deliberately NOT using
  // single $...$ as a delimiter — that collides with plain currency
  // amounts ("$100") and turns ordinary text into broken math.
  // Only call this on a FINISHED element, never mid-typewriter-animation:
  // it's a real DOM scan + render pass, and incomplete LaTeX while
  // still typing (an unclosed \( with no \) yet) would either render
  // wrong or just get skipped until the closing delimiter arrives —
  // both wasted work happening dozens of times during one type-out.
  function renderMathIn(el) {
    if (typeof renderMathInElement === 'undefined') return; // CDN didn't load — formulas stay as plain text, not broken
    try {
      renderMathInElement(el, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '\\[', right: '\\]', display: true },
          { left: '\\(', right: '\\)', display: false }
        ],
        throwOnError: false,
        errorColor: 'inherit'
      });
    } catch (e) {}
  }

  function highlightCodeIn(el) {
    if (typeof hljs === 'undefined') return; // CDN didn't load — code still shows, just unhighlighted
    el.querySelectorAll('pre code[class^="language-"]').forEach(block => {
      try { hljs.highlightElement(block); } catch (e) {}
    });
  }

  // Wraps a bare SVG (just the <svg>...</svg> markup, not a full HTML
  // document) in a minimal page so it centers nicely in the preview
  // iframe — an .html file's code is presumably already a complete
  // document and gets used as-is.
  function wrapForPreview(code, ext) {
    if (ext === 'svg') {
      return `<!DOCTYPE html><html><head><meta charset="utf-8"></head>
        <body style="margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff;">
        ${code}</body></html>`;
    }
    return code;
  }

  function renderFilePreviewsIn(el) {
    el.querySelectorAll('iframe.file-card-preview').forEach(frame => {
      const id = frame.dataset.codeId;
      const code = _codeBlockText[id];
      if (code === undefined || frame.dataset.loaded) return;
      const card = frame.closest('.file-card');
      const filename = card ? card.querySelector('.file-card-name').textContent : '';
      const ext = (filename.split('.').pop() || '').toLowerCase();
      // .srcdoc is set as a JS PROPERTY, not written into the HTML
      // string anywhere — generated code can contain quotes, backticks,
      // anything, and trying to escape arbitrary content into an HTML
      // attribute is exactly the kind of thing that breaks later.
      frame.srcdoc = wrapForPreview(code, ext);
      frame.dataset.loaded = '1';
    });
  }

  // Single entry point for everything that only needs to run once on
  // FINISHED content: math, syntax colors, and populating preview
  // iframes. One helper instead of three separate calls so a future
  // call site can't add math rendering and forget the other two.
  function finalizeRenderedContent(el) {
    renderMathIn(el);
    highlightCodeIn(el);
    renderFilePreviewsIn(el);
  }

  function flashAction(btn) {
    btn.classList.add('copied');
    setTimeout(() => btn.classList.remove('copied'), 1200);
  }

  function buildActionToolbar(rawTextGetter, question) {
    const bar = document.createElement('div');
    bar.className = 'msg-actions';

    const copyBtn = document.createElement('button');
    copyBtn.className = 'msg-action-btn';
    copyBtn.innerHTML = ICONS.copy;
    copyBtn.title = 'Copy';
    copyBtn.onclick = async () => {
      try { await navigator.clipboard.writeText(rawTextGetter()); flashAction(copyBtn); }
      catch(e) {}
    };

    const upBtn = document.createElement('button');
    upBtn.className = 'msg-action-btn';
    upBtn.innerHTML = ICONS.up;
    upBtn.title = 'Good response';

    const downBtn = document.createElement('button');
    downBtn.className = 'msg-action-btn';
    downBtn.innerHTML = ICONS.down;
    downBtn.title = 'Bad response';

    upBtn.onclick = () => {
      const wasActive = upBtn.classList.contains('active');
      upBtn.classList.toggle('active', !wasActive);
      upBtn.classList.toggle('up', !wasActive);
      downBtn.classList.remove('active', 'down');
    };
    downBtn.onclick = () => {
      const wasActive = downBtn.classList.contains('active');
      downBtn.classList.toggle('active', !wasActive);
      downBtn.classList.toggle('down', !wasActive);
      upBtn.classList.remove('active', 'up');
    };

    const shareBtn = document.createElement('button');
    shareBtn.className = 'msg-action-btn';
    shareBtn.innerHTML = ICONS.share;
    shareBtn.title = 'Share';
    shareBtn.onclick = async () => {
      const text = rawTextGetter();
      if (navigator.share) {
        try { await navigator.share({ text }); } catch(e) {}
      } else {
        try { await navigator.clipboard.writeText(text); flashAction(shareBtn); } catch(e) {}
      }
    };

    bar.appendChild(copyBtn);
    bar.appendChild(upBtn);
    bar.appendChild(downBtn);
    bar.appendChild(shareBtn);

    if (question) {
      const redoBtn = document.createElement('button');
      redoBtn.className = 'msg-action-btn';
      redoBtn.innerHTML = ICONS.redo;
      redoBtn.title = 'Regenerate';
      redoBtn.onclick = () => regenerate(redoBtn, question);
      bar.appendChild(redoBtn);
    }

    return bar;
  }

  function addMsg(text, role, opts) {
    opts = opts || {};
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    if (role === 'daisy') {
      const label = document.createElement('div');
      label.className = 'daisy-label';
      label.textContent = 'Daisy';
      const body = document.createElement('div');
      body.className = 'md-body';
      body.innerHTML = renderMarkdown(text);
      finalizeRenderedContent(body);
      div.appendChild(label);
      div.appendChild(body);
      div.appendChild(buildActionToolbar(() => body.innerText, opts.question));
    } else {
      div.textContent = text;
      div.addEventListener('click', () => openMsgMenu(div, text));
    }

    chatArea.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    return div;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // Whether the view should keep following new content. A REAL user
  // scroll gesture (wheel/touch-drag — see the listeners below) turns
  // this off immediately, so the typewriter animation stops chasing
  // them instead of re-asserting a smooth-scroll every ~14ms, which is
  // what made it feel "impossible" to scroll up while Daisy was typing.
  let stickToBottom = true;

  function maybeAutoScroll() {
    // 'auto' (instant), not 'smooth' — smooth re-triggered every tick
    // stacks/restarts its own animation and is what caused the fight
    // in the first place.
    if (stickToBottom) mainEl.scrollTo({ top: mainEl.scrollHeight, behavior: 'auto' });
  }

  // Typed reveal of an already-complete answer. This is a SIMULATED
  // typing effect on text we already have in full — not real token
  // streaming from Claude. True streaming would need the backend to
  // push partial output over time (server-sent events + a streaming
  // call to the Anthropic API); this gets the same visual effect
  // without that infrastructure.
  async function typeIntoBody(body, fullText, div) {
    // Skip the per-character animation for anything containing a code
    // block, or for long replies in general. Each tick re-parses the
    // ENTIRE text from scratch — for a multi-thousand-character file,
    // that's hundreds of full markdown parses over the course of one
    // message, each bigger than the last (cost grows with the square
    // of the length). That's what caused the multi-second freeze and
    // "can't scroll" complaint — not the typing animation looking
    // slow, but the browser's main thread genuinely busy doing that
    // repeated work. Nobody actually wants to watch raw HTML/CSS type
    // out letter by letter anyway, so this renders code/long content
    // once, complete, while keeping the animation for normal-length
    // conversational replies where the cost is negligible.
    const hasCode = fullText.includes('```');
    if (hasCode || fullText.length > 1200) {
      body.innerHTML = renderMarkdown(fullText);
      finalizeRenderedContent(body);
      maybeAutoScroll();
      return;
    }

    // Bigger steps, less often: each tick does a full markdown parse +
    // HTML sanitize pass. At the old pace (~70/sec) that's enough
    // constant main-thread work to make a slower phone feel like it's
    // ignoring touch input until typing finishes — not actually
    // blocked, just too busy to respond smoothly. Fewer, larger steps
    // cuts that work by roughly 3x while still reading as "typing."
    const CHUNK = 10, DELAY_MS = 24;
    for (let i = 0; i <= fullText.length; i += CHUNK) {
      body.innerHTML = renderMarkdown(fullText.slice(0, i));
      maybeAutoScroll();
      await sleep(DELAY_MS);
    }
    body.innerHTML = renderMarkdown(fullText); // final clean pass
    finalizeRenderedContent(body);
  }

  async function addMsgTyped(text, opts) {
    opts = opts || {};
    const div = document.createElement('div');
    div.className = 'msg daisy';
    const label = document.createElement('div');
    label.className = 'daisy-label';
    label.textContent = 'Daisy';
    const body = document.createElement('div');
    body.className = 'md-body';
    div.appendChild(label);
    div.appendChild(body);
    chatArea.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });

    await typeIntoBody(body, text, div);
    div.appendChild(buildActionToolbar(() => body.innerText, opts.question));
    return div;
  }

  async function regenerate(btn, question) {
    const msgDiv = btn.closest('.msg.daisy');
    const body = msgDiv.querySelector('.md-body');
    const original = body.innerHTML;
    body.style.opacity = '0.55';
    body.innerHTML = 'Thinking again…';
    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      const answer = data.answer || "I'm still learning about that. Ask me something else.";
      body.style.opacity = '1';
      await typeIntoBody(body, answer, msgDiv);
    } catch(e) {
      body.innerHTML = original;
      body.style.opacity = '1';
    }
  }

  // ── TAP MENU on a user's own sent message ──
  const msgMenu        = document.getElementById('msg-menu');
  const msgMenuOverlay = document.getElementById('msg-menu-overlay');

  function closeMsgMenu() {
    msgMenu.style.display = 'none';
    msgMenuOverlay.classList.remove('show');
  }
  msgMenuOverlay.addEventListener('click', closeMsgMenu);

  function openMsgMenu(msgDiv, text) {
    const rect = msgDiv.getBoundingClientRect();
    msgMenu.innerHTML = '';

    const items = [
      { icon: ICONS.copy, label: 'Copy message', action: async () => {
          try { await navigator.clipboard.writeText(text); } catch(e) {}
          closeMsgMenu();
        } },
      { icon: ICONS.edit, label: 'Edit & resend', action: () => {
          inp.value = text;
          inp.focus();
          inp.dispatchEvent(new Event('input'));
          closeMsgMenu();
        } },
      { icon: ICONS.trash, label: 'Delete', danger: true, action: () => {
          const next = msgDiv.nextElementSibling;
          if (next && next.classList.contains('daisy')) next.remove();
          msgDiv.remove();
          closeMsgMenu();
        } },
    ];

    items.forEach(it => {
      const btn = document.createElement('button');
      btn.className = 'msg-menu-item' + (it.danger ? ' danger' : '');
      btn.innerHTML = `${it.icon}<span>${it.label}</span>`;
      btn.onclick = it.action;
      msgMenu.appendChild(btn);
    });

    msgMenu.style.display = 'block';
    msgMenuOverlay.classList.add('show');
    // Position above-right of the tapped bubble, clamped to viewport.
    const menuWidth = 200;
    let left = Math.min(rect.right - menuWidth, window.innerWidth - menuWidth - 12);
    left = Math.max(left, 12);
    let top = rect.bottom + 6;
    if (top + 170 > window.innerHeight) top = rect.top - 176;
    msgMenu.style.left = left + 'px';
    msgMenu.style.top = top + 'px';
  }

  // ── THINKING PANEL — shows real steps, ending on whichever "law"
  // actually answered (Daisy's source field), not a fake animation
  // disconnected from what really happened. ──
  // Detects Daisy's own ```language:filename.ext convention in the
  // final answer text, so the thinking panel can say what was actually
  // built instead of a generic brain-routing label.
  function detectFileInAnswer(answer) {
    if (!answer) return null;
    const m = answer.match(/```[a-zA-Z0-9_-]*:([^\n`]+\.[a-zA-Z0-9]+)\s*\n/);
    return m ? m[1].trim() : null;
  }

  function sourceToFinalStep(data) {
    const file = detectFileInAnswer(data.answer);
    if (file) return { label: `Built \`${file}\``, tag: 'file' };
    const src = data.source;
    const hasDraft = !!(data.raw_fact && String(data.raw_fact).trim());
    const map = {
      personality: "Found the right tone",
      math:        "Worked it out",
      scenario:    "Worked it out",
      emotion:     "Read the tone",
      learned:     "Found this saved from before",
    };
    if (map[src]) return { label: map[src], tag: src };
    if (src === 'dictionary' || src === 'synthesis') {
      return hasDraft
        ? { label: "Found a match — polishing it", tag: src }
        : { label: "Nothing on this yet — researching it now", tag: src };
    }
    if (src === 'unknown') return { label: "Nothing on this yet — researching it now", tag: src };
    return { label: "Putting it together", tag: src || 'reply' };
  }

  function addThinkingPanel() {
    const div = document.createElement('div');
    div.className = 'thinking-panel';
    div.innerHTML = '<span class="t-dot"></span><span class="thinking-step">Reading your message…</span>';
    chatArea.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });

    const stepEl = div.querySelector('.thinking-step');
    let cancelled = false;
    const t = setTimeout(async () => {
      if (cancelled) return;
      stepEl.style.opacity = '0';
      await sleep(220);
      if (cancelled) return;
      stepEl.textContent = "Checking Daisy's dictionary…";
      stepEl.style.opacity = '1';
    }, 550);

    div._cancel = () => { cancelled = true; clearTimeout(t); };
    div._stepEl = stepEl;
    return div;
  }

  async function settleThinkingPanel(panel, data) {
    panel._cancel();
    const final = sourceToFinalStep(data);

    if (final.tag === 'file') {
      // Extra beat for files specifically — reads as a small build
      // sequence rather than one label swap, closer to what you see
      // when Claude or other AI tools generate a file.
      panel._stepEl.style.opacity = '0';
      await sleep(150);
      panel._stepEl.textContent = 'Writing it out…';
      panel._stepEl.style.opacity = '1';
      await sleep(380);
      panel._stepEl.style.opacity = '0';
      await sleep(150);
    } else {
      panel._stepEl.style.opacity = '0';
      await sleep(150);
    }

    panel._stepEl.innerHTML = `${escHtml(final.label)}<span class="thinking-tag">${escHtml(final.tag)}</span>`;
    panel._stepEl.style.opacity = '1';
    await sleep(420);
    panel.remove();
  }

  async function sendMessage(overrideText) {
    const text = overrideText || inp.value.trim();
    if (!text) return;
    inp.value = '';
    inp.style.height = 'auto';
    activateChat();
    stickToBottom = true;
    addMsg(text, 'user');
    const panel = addThinkingPanel();

    try {
      const res  = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: text })
      });
      const data = await res.json();
      const answer = data.answer || "I'm still learning about that. Ask me something else.";
      await settleThinkingPanel(panel, data);
      await addMsgTyped(answer, { question: text });
      if (ttsOn) speak(answer);
    } catch(e) {
      panel._cancel();
      panel.remove();
      addMsg("I couldn't reach my brain right now. Try again.", 'daisy');
    }
  }

  function quickAsk(text) {
    activateChat();
    inp.value = text;
    sendMessage(text);
  }

  // ── SCROLL TO BOTTOM ──
  const scrollBtn = document.getElementById('scroll-bottom-btn');
  const mainEl = document.getElementById('main');

  // wheel / touchmove only ever fire from a real input device, never
  // from our own mainEl.scrollTo(...) calls — so these are a clean,
  // unambiguous signal that the person actually wants to look away,
  // with no risk of our own auto-scroll re-triggering itself.
  mainEl.addEventListener('wheel', () => { stickToBottom = false; }, { passive: true });
  mainEl.addEventListener('touchmove', () => { stickToBottom = false; }, { passive: true });

  mainEl.addEventListener('scroll', () => {
    const fromBottom = mainEl.scrollHeight - mainEl.scrollTop - mainEl.clientHeight;
    if (fromBottom < 60) stickToBottom = true; // they scrolled back to the bottom themselves
    scrollBtn.classList.toggle('show', chatActive && fromBottom > 200);
  });
  scrollBtn.addEventListener('click', () => {
    stickToBottom = true;
    mainEl.scrollTo({ top: mainEl.scrollHeight, behavior: 'smooth' });
  });

  // ── ACTION BUTTON (live mic ↔ send swap) ─────────────
  const actionBtn       = document.getElementById('action-btn');
  const actionLiveIcon  = document.getElementById('action-live-icon');
  const actionSendIcon  = document.getElementById('action-send-icon');
  let actionMode = 'live'; // 'live' or 'send'

  function setActionMode(mode) {
    actionMode = mode;
    if (mode === 'send') {
      actionBtn.classList.add('send-mode');
      actionBtn.title = 'Send';
      actionLiveIcon.style.display = 'none';
      actionSendIcon.style.display = 'flex';
    } else {
      actionBtn.classList.remove('send-mode');
      actionBtn.title = 'Live voice';
      actionLiveIcon.style.display = 'flex';
      actionSendIcon.style.display = 'none';
    }
  }

  inp.addEventListener('input', () => {
    setActionMode(inp.value.trim() ? 'send' : 'live');
  });

  actionBtn.onclick = () => {
    if (actionMode === 'send') sendMessage();
    else openLive();
  };

  // ── TTS ───────────────────────────────────────────────
  let ttsOn = false;
  const speakerBtn = document.getElementById('speaker-btn');
  speakerBtn.onclick = () => {
    ttsOn = !ttsOn;
    speakerBtn.style.color = ttsOn ? 'var(--daisy)' : 'var(--muted)';
    speakerBtn.style.background = ttsOn ? 'rgba(126,184,247,0.12)' : 'var(--card)';
  };

  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = 1.0; utt.pitch = 1.05;
    window.speechSynthesis.speak(utt);
  }

  // ── LIVE ROOM ─────────────────────────────────────────
  const liveRoom   = document.getElementById('live-room');
  const endLive    = document.getElementById('end-live');
  const micBtn     = document.getElementById('mic-btn');
  const transcript = document.getElementById('live-transcript');
  const waveBars   = document.querySelectorAll('.wave-bar');

  let mediaStream = null, audioCtx = null, analyser = null, waveRAF = null;
  let recognition = null, micMuted = false;

  endLive.onclick = endLiveSession;

  async function openLive() {
    liveRoom.classList.add('active');
    transcript.textContent = 'Listening...';
    await startMic();
    startSpeechRecognition();
  }

  function endLiveSession() {
    liveRoom.classList.remove('active');
    stopMic();
    stopSpeechRecognition();
    transcript.textContent = 'Listening...';
    // Restore idle animation
    waveBars.forEach(b => { b.classList.add('idle'); b.style.height = ''; });
  }

  async function startMic() {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 64;
      audioCtx.createMediaStreamSource(mediaStream).connect(analyser);
      animateWave();
    } catch(e) {
      transcript.textContent = 'Microphone access needed.';
    }
  }

  function stopMic() {
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    if (audioCtx)    { audioCtx.close(); audioCtx = null; }
    if (waveRAF)     { cancelAnimationFrame(waveRAF); waveRAF = null; }
  }

  function animateWave() {
    if (!analyser) return;
    const data = new Uint8Array(analyser.frequencyBinCount);
    function frame() {
      analyser.getByteFrequencyData(data);
      waveBars.forEach((bar, i) => {
        const val = data[i % data.length] || 0;
        const h = 6 + (val / 255) * 68;
        bar.style.height = h + 'px';
        bar.classList.remove('idle');
      });
      waveRAF = requestAnimationFrame(frame);
    }
    frame();
  }

  function startSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { transcript.textContent = 'Speech not supported in this browser.'; return; }
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onresult = async (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      transcript.textContent = final || interim || '...';

      if (final.trim()) {
        const question = final.trim();

        activateChat();
        stickToBottom = true;
        addMsg(question, 'user');
        const panel = addThinkingPanel();
        try {
          const res  = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question })
          });
          const data = await res.json();
          const answer = data.answer || "Still learning that one.";
          await settleThinkingPanel(panel, data);
          await addMsgTyped(answer, { question });
          transcript.textContent = answer;
          speak(answer);
        } catch(e) {
          panel._cancel();
          panel.remove();
          transcript.textContent = "Couldn't reach Daisy.";
        }
      }
    };

    recognition.onerror = () => { transcript.textContent = 'Listening...'; };
    recognition.onend   = () => { if (liveRoom.classList.contains('active')) recognition.start(); };
    recognition.start();
  }

  function stopSpeechRecognition() {
    if (recognition) { recognition.stop(); recognition = null; }
  }

  micBtn.onclick = () => {
    micMuted = !micMuted;
    micBtn.classList.toggle('muted', micMuted);
    micBtn.style.opacity = micMuted ? '0.5' : '1';
    if (mediaStream) mediaStream.getTracks().forEach(t => { t.enabled = !micMuted; });
    if (micMuted && recognition) recognition.stop();
    else if (!micMuted && liveRoom.classList.contains('active')) startSpeechRecognition();
  };

  // ── DRAWER ────────────────────────────────────────────
  const drawer        = document.getElementById('drawer');
  const drawerOverlay = document.getElementById('drawer-overlay');
  document.getElementById('menu-btn').onclick = () => {
    drawer.classList.add('open');
    drawerOverlay.classList.add('active');
  };
  drawerOverlay.onclick = closeDrawer;
  function closeDrawer() {
    drawer.classList.remove('open');
    drawerOverlay.classList.remove('active');
  }

  // ── DAISY STATUS ──────────────────────────────────────
  async function checkStatus() {
    closeDrawer();
    try {
      const res  = await fetch('/daisy/status');
      const data = await res.json();
      activateChat();
      addMsg(`Daisy knows ${data.words.toLocaleString()} words. Last ingestion: ${data.last_ingest}. Cycles completed: ${data.ingest_cycles}.`, 'daisy');
    } catch(e) {
      activateChat();
      addMsg("Couldn't fetch Daisy's stats right now.", 'daisy');
    }
  }

  } catch(err) {
    // If anything crashes on load, show a visible error so we can debug
    console.error('Daisy init error:', err);
    document.body.innerHTML = '<div style="color:#f0f0f0;background:#2b2b2b;height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;padding:24px;text-align:center;flex-direction:column;gap:12px"><div style="font-size:24px">⚠️</div><div>Daisy failed to load</div><div style="font-size:12px;color:#888">' + err.message + '</div></div>';
  }
}); // end DOMContentLoaded
</script>
</body>
</html>
